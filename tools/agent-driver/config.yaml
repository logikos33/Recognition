# Driver headless — Fase D3
# Configuração mínima. Editar com cuidado: budget e allowedTools são trilhos de segurança.

model: claude-sonnet-4-6
base_branch: develop
max_retries: 3
budget_minutes: 20

# Allowlist obrigatória. NÃO usar --dangerously-skip-permissions.
# Bash() limita por prefixo de comando; tudo fora dessa lista pede permissão e é negado em headless.
# git add/commit NÃO estão aqui — o driver faz os commits, o claude apenas edita.
allowed_tools:
  - Read
  - Edit
  - Write
  - Glob
  - Grep
  - Bash(git status)
  - Bash(git diff:*)
  - Bash(git log:*)
  - Bash(git ls-files:*)
  - Bash(python:*)
  - Bash(python3:*)
  - Bash(pytest:*)
  - Bash(ruff:*)
  - Bash(bash tests/*)
  - Bash(npx tsc:*)

# Evals por tipo de tarefa. A spec referencia o nome (ex: eval: harness).
checks:
  default:
    - ruff check .
    - pytest -q
    - npx tsc --noEmit
  harness:
    - bash tests/harness/migrations/run.sh

# Branches/caminhos protegidos. Defense-in-depth:
# - protected_branches: além do main, develop/staging também — driver SÓ commita em agent/*.
# - protected_paths: qualquer toque aborta o push.
guard_rails:
  protected_branches:
    - main
    - develop
    - staging
  protected_paths:
    - infra/migrations/
    - .github/workflows/
    - railway_start.py
