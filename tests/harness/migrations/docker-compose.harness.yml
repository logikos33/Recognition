services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: harness
      POSTGRES_PASSWORD: harness
      POSTGRES_DB: recognition_harness
    ports:
      - "55432:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "harness", "-d", "recognition_harness"]
      interval: 2s
      timeout: 5s
      retries: 15
