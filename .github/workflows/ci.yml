name: CI

on:
  push:
    branches: [develop, staging, main, "feature/**"]
  pull_request:
    branches: [develop, staging, main]

jobs:
  ruff:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check services/api/

  pytest:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: recognition_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements/api.txt pytest pytest-cov
      - run: pytest services/api/tests/ -v --tb=short -q
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/recognition_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET_KEY: ci-test-secret-key-32chars-minimum
          SERVICE_TYPE: api

  tsc:
    name: TypeScript check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/frontend/package-lock.json
      - run: npm ci --legacy-peer-deps
        working-directory: apps/frontend
      - run: npx tsc --noEmit
        working-directory: apps/frontend
