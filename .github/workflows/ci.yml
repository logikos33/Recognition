name: CI

on:
  push:
    branches: [develop, staging, main, "feature/**"]
  pull_request:
    branches: [develop, staging, main]

jobs:
  license-gate:
    name: License gate (no AGPL in serving path)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run license gate
        run: python scripts/check_license_gate.py
      - name: Upload THIRD_PARTY_NOTICES
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: third-party-notices
          path: THIRD_PARTY_NOTICES.txt
          if-no-files-found: ignore

  ruff:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check services/api/

  pytest:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: recognition_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements/api.txt pytest pytest-cov
      # Paths relativos ao rootdir=services/api/ (pyproject.toml define [tool.pytest.ini_options] lá)
      # --cov-config explícito porque CWD é a raiz do repo, não services/api/
      - run: |
          pytest services/api/tests/ -v --tb=short -q --cov=app --cov-report=term-missing --cov-fail-under=60 --cov-config=services/api/pyproject.toml
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/recognition_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET_KEY: ci-test-secret-key-32chars-minimum
          SERVICE_TYPE: api

  tsc:
    name: TypeScript check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/frontend/package-lock.json
      - run: npm ci --legacy-peer-deps
        working-directory: apps/frontend
      - run: npx tsc --noEmit
        working-directory: apps/frontend

  migrations-harness:
    name: Migrations harness (D1)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: harness
          POSTGRES_PASSWORD: harness
          POSTGRES_DB: recognition_harness
        ports: ["55432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r tests/harness/migrations/requirements.txt
      - name: Passada 1 — banco limpo
        run: python tests/harness/migrations/runner.py --pass 1
        env:
          HARNESS_DATABASE_URL: postgresql://harness:harness@localhost:55432/recognition_harness
      - name: Passada 2 — idempotência (C-02)
        run: python tests/harness/migrations/runner.py --pass 2
        env:
          HARNESS_DATABASE_URL: postgresql://harness:harness@localhost:55432/recognition_harness
      - name: pytest — asserts de schema
        run: pytest tests/harness/migrations/ -v
        env:
          HARNESS_DATABASE_URL: postgresql://harness:harness@localhost:55432/recognition_harness

  frontend:
    name: Frontend tests (tsc + vitest + playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/frontend/package-lock.json
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('apps/frontend/package-lock.json') }}
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        working-directory: apps/frontend
      - name: Type check
        run: npx tsc --noEmit
        working-directory: apps/frontend
      - name: Unit tests (vitest)
        run: npm run test
        working-directory: apps/frontend
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: apps/frontend
      - name: E2E smoke test (playwright)
        run: npm run test:e2e
        working-directory: apps/frontend
